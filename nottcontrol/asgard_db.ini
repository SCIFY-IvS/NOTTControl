
[vlti]
conf_string = U1,U2,U3,U4              #                The list of station location indicators
conf_name = "UTs"
order = 0,3,2,1                        #                The order of the inputs
diam = 8.0, 8.0, 8.0, 8.0                      # m       telescope diameter (8.2 for UTs, 1.8 for ATs)
cen_obs = 1.116, 1.116, 1.116, 1.116                  # m       size of central obscuration (1.116 for UTs, 0.138 for ATs)

DL1 = 'DL5     '      # Delay line used in arm 1.              HIERARCH ESO ISS CONF 
DL2 = 'DL2     '      # Delay line used in arm 2.              HIERARCH ESO ISS CONF 
DL3 = 'DL3     '      # Delay line used in arm 3 .             HIERARCH ESO ISS CONF 
DL4 = 'DL4     '      # Delay line used in arm 4.              HIERARCH ESO ISS CONF 
INPUT1 = 1            # Primary lab input channel arm 1.             HIERARCH ESO ISS CONF 
INPUT2 = 3            # Primary lab input channel arm 2.             HIERARCH ESO ISS CONF 
INPUT3 = 5            # Primary lab input channel arm 3.             HIERARCH ESO ISS CONF 
INPUT4 = 7            # Primary switchyard config. arm 4.            HIERARCH ESO ISS CONF 
NTEL = 4              # Number of telescopes used.                     HIERARCH ESO ISS CONF 
STATION1 = U1       # Station of telescope arm 1.       HIERARCH ESO ISS CONF 
STATION2 = U2       # Station of telescope arm 2.       HIERARCH ESO ISS CONF 
STATION3 = U3       # Station of telescope arm 3.       HIERARCH ESO ISS CONF 
STATION4 = U4       # Station of telescope arm 4.       HIERARCH ESO ISS CONF 

[conditions]
t_sky = 285.                         # [K]       atmospheric temperature
pres = 743.                          # [mbar]    atmospheric pressure
co2 = 450.                           # [ppm]     CO2 fraction
rhum = 15.                           # [%]       relative humidity
T_tun = 290.0                        # [K]       Ambient temperature of tunels
T_telescopes = 290.0                 # [K]       Ambient temperature of telescopes
T_labo = 290.0                       # [K]       Temperature in the lab

[target]
mode = name                            #           How the target location is provided
target = 61 Vir                        #           name or location (depends on mode)
ra = None
dec = None

[nott_instructions]
dit = 0.1
n_coadds = 6000
mode = planet

[asgard]
wl_ft = 2.0e-6, 2.5e-6                 #  [m]     Array containing the wavelengths for the fringe tracker. The first and last values define the band.


